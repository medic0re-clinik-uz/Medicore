<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MediCore — CareTrack Clinic TYBT</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏥</text></svg>"/>
  <link rel="stylesheet" href="./style.css"/>
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>
<body class="theme-light">


<div id="login-page" class="login-wrapper">
  <div class="login-card">
    <div class="login-logo">
      <div class="logo-icon">🏥</div>
      <h1>MediCore</h1>
      <p class="login-sub">CareTrack Clinic — TYBT</p>
    </div>
    <h2>Tizimga kirish</h2>
    <p class="login-desc">Tibbiy Yozuvlarni Boshqarish Tizimi</p>
    <div class="form-group">
      <label>Login</label>
      <input id="inp-username" type="text" placeholder="username" autocomplete="username"/>
    </div>
    <div class="form-group">
      <label>Parol</label>
      <div class="pwd-wrap">
        <input id="inp-password" type="password" placeholder="••••••••" autocomplete="current-password"/>
        <button class="pwd-toggle" onclick="togglePwd()">👁</button>
      </div>
    </div>
    <div id="login-error" class="alert alert-danger hidden"></div>
    <button class="btn btn-primary btn-block" style="margin-top:4px;padding:11px" onclick="doLogin()">Kirish</button>
    <div class="login-hints">
      <div class="hints-title">Test kirish ma'lumotlari</div>
      <button class="hint-btn" onclick="fillLogin('admin','Admin@2024')">
        <span class="hint-role admin-role">Admin</span>admin / Admin@2024
      </button>
      <button class="hint-btn" onclick="fillLogin('doctor1','Doc@1234')">
        <span class="hint-role clinic-role">Klinitsist</span>doctor1 / Doc@1234
      </button>
      <button class="hint-btn" onclick="fillLogin('reception','Rec@5678')">
        <span class="hint-role recep-role">Qabulxona</span>reception / Rec@5678
      </button>
    </div>
  </div>
</div>


<div id="app" class="hidden">
  <aside id="sidebar">
    <div class="sidebar-logo">
      <div class="s-logo-mark">🏥</div>
      <div>
        <div class="s-logo-name">MediCore</div>
        <div class="s-logo-sub">Care Track</div>
      </div>
    </div>
    <div class="sidebar-user">
      <div id="s-avatar" class="s-avatar"></div>
      <div>
        <div id="s-name" class="s-name"></div>
        <div id="s-role" class="s-role"></div>
      </div>
    </div>
    <nav id="sidebar-nav"></nav>
    <div class="sidebar-bottom">
      <button class="theme-toggle" onclick="toggleTheme()">
        <span id="theme-icon">🌙</span>
        <span id="theme-label">Tungi rejim</span>
      </button>
      <button class="btn-logout" onclick="doLogout()">🚪 Chiqish</button>
    </div>
  </aside>

  <main id="main-content">
    <div id="page-content"></div>
  </main>
</div>


<div id="modal-overlay" class="modal-overlay hidden" onclick="closeModal(event)">
  <div class="modal-box" id="modal-box">
    <div class="modal-header">
      <h3 id="modal-title"></h3>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>


<div id="confirm-overlay" class="modal-overlay hidden">
  <div class="modal-box confirm-box">
    <div class="modal-body">
      <div class="confirm-icon">⚠️</div>
      <p id="confirm-msg"></p>
      <div class="confirm-btns">
        <button class="btn btn-outline" onclick="closeConfirm()">Bekor qilish</button>
        <button class="btn btn-danger" id="confirm-ok">O'chirish</button>
      </div>
    </div>
  </div>
</div>


<div id="toast" class="toast hidden"></div>

<script src="./js/api.js"></script>
<script src="./js/app.js"></script>
</body>
</html>
